<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tambola - Host Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tambola Host Controls</h1>
            <div class="controls">
                <button id="pickBtn" class="btn primary">Pick Number</button>
                <div style="display: flex; gap: 10px;">
                    <a href="/generator" class="btn secondary" style="text-decoration: none; text-align: center; border-color: #f59e0b; color: #f8fafc; background: rgba(245, 158, 11, 0.2);">Generate Tickets</a>
                    <button id="resetBtn" class="btn secondary">Reset Game</button>
                    <a href="/logout" class="btn secondary" style="text-decoration: none; text-align: center; border-color: #64748b; color: #cbd5e1;">Log Out</a>
                </div>
            </div>
        </header>
        
        <div class="validator-card" style="background-color: var(--card-bg); padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center;">
            <h2 style="color: #cbd5e1; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Quick Validate</h2>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <input type="text" id="ticketIdInput" placeholder="Enter ID (e.g. 84291-5)" style="padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; width: 200px;">
                <button id="validateBtn" class="btn primary" style="width: auto; padding: 10px 15px;">Check</button>
            </div>
            <div id="validationResult" style="margin-top: 15px; display: none;"></div>
        </div>

        <div class="main-content">
            <div class="current-number-card">
                <h2>Latest Pick</h2>
                <div id="currentNumber" class="current-number">--</div>
                <div id="numberHistory" class="history-balls"></div>
            </div>

            <div class="board-area">
                <div id="boardGrid" class="board-grid">
                    <!-- Generate 90 cells -->
                    {% for i in range(1, 91) %}
                        {% if i in state.history %}
                            <div class="cell picked" id="cell-{{ i }}">{{ i }}</div>
                        {% else %}
                            <div class="cell" id="cell-{{ i }}">{{ i }}</div>
                        {% endif %}
                    {% endfor %}
                </div>
            </div>
        </div>
        <footer style="text-align: center; font-size: 11px; color: #64748b; margin-top: 15px; padding-bottom: 10px;">
            &copy; 2026 NIC Youth
        </footer>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
