<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tambola Board (Player View)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tambola Board (Player View)</h1>
            <div class="controls">
                <p style="font-size:12px; color:#94a3b8;">Waiting for Host to draw numbers...</p>
            </div>
        </header>

        <div class="main-content">
            <div class="current-number-card">
                <h2>Latest Pick</h2>
                <div id="currentNumber" class="current-number">--</div>
                <div id="numberHistory" class="history-balls"></div>
            </div>

            <div class="board-area">
                <div id="boardGrid" class="board-grid">
                    <!-- Generate 90 cells -->
                    {% for i in range(1, 91) %}
                        {% if i in state.history %}
                            <div class="cell picked" id="cell-{{ i }}">{{ i }}</div>
                        {% else %}
                            <div class="cell" id="cell-{{ i }}">{{ i }}</div>
                        {% endif %}
                    {% endfor %}
                </div>
            </div>
        </div>
        <!-- BINGO Claim Notification Overlay (hidden by default) -->
        <div id="bingoOverlay" class="bingo-overlay" style="display:none;">
            <div class="bingo-popup">
                <div class="bingo-icon">🚨</div>
                <div class="bingo-text">A Player is Claiming BINGO!</div>
                <div class="bingo-sub">Host, please verify the ticket!</div>
            </div>
        </div>

        <!-- BINGO Claim Button Area -->
        <div class="bingo-section">
            <button id="claimBingoBtn" class="btn-bingo">
                🏆 KLAIM BINGO!
            </button>
            <p id="bingoCooldownMsg" style="display:none; font-size:11px; color:#64748b; margin-top:6px;"></p>
        </div>

        <footer style="text-align: center; font-size: 11px; color: #64748b; margin-top: 10px; padding-bottom: 10px;">
            &copy; 2026 NIC Youth
        </footer>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
